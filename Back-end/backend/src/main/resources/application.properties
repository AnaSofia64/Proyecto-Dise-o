spring.application.name=parkflow-backend
server.port=8080

# JWT
jwt.secret=parkflow-super-secret-key-2024-must-be-long-enough-for-hs256
jwt.expiration=86400000

# Supabase PostgreSQL
spring.datasource.url=jdbc:postgresql://aws-1-us-east-2.pooler.supabase.com:6543/postgres?user=postgres.wvwhymgxakacslrffgkc&password=dNFDWq0UcVZVzBNv&sslmode=require
spring.datasource.username=postgres.wvwhymgxakacslrffgkc
spring.datasource.password=dNFDWq0UcVZVzBNv
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Actuator
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.prometheus.enabled=true
spring.mvc.async.request-timeout=8000

# Tracing
management.tracing.sampling.probability=1.0
otel.exporter.otlp.endpoint=http://localhost:4317
otel.exporter.otlp.protocol=grpc
otel.metrics.exporter=none
otel.logs.exporter=none

# HikariCP - limitar conexiones para Supabase free tier
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000